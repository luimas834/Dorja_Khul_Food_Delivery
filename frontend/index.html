<!DOCTYPE html>
<html>
<head>
  <title>Food Delivery UI</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    ul { padding-left: 18px; }
    .msg { margin-top: 6px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Food Delivery - Customer UI</h2>

  <div class="section">
    <h3>Register New Customer</h3>
    <input id="custName" placeholder="Name" />
    <input id="custPhone" placeholder="Phone" />
    <input id="custAddress" placeholder="Address" />
    <button onclick="registerCustomer()">Register</button>
    <div id="custMsg" class="msg"></div>
  </div>

  <div class="section">
    <h3>Customers (Choose yourself)</h3>
    <button onclick="loadCustomers()">Load Customers</button>
    <ul id="customers"></ul>
  </div>

  <div class="section">
    <h3>Restaurants by Area</h3>
    <input id="area" placeholder="Area (e.g. 789 Oak)" />
    <button onclick="getRestaurants()">Search</button>
    <ul id="restaurants"></ul>
  </div>

  <div class="section">
    <h3>Menu by Restaurant</h3>
    <input id="restaurantId" placeholder="Restaurant ID" />
    <button onclick="getMenu()">Get Menu</button>
    <ul id="menu"></ul>
  </div>

  <div class="section">
    <h3>Place Order</h3>
    <input id="customerId" placeholder="Customer ID" />
    <input id="menuItemId" placeholder="Menu Item ID" />
    <input id="qty" placeholder="Quantity" />
    <input id="coupon" placeholder="Coupon (optional)" />
    <button onclick="placeOrder()">Place Order</button>
    <div id="orderResult" class="msg"></div>
  </div>

  <div class="section">
    <h3>Pay + Assign Rider</h3>
    <input id="orderIdPay" placeholder="Order ID" />
    <input id="payMethod" placeholder="CASH or CARD" />
    <button onclick="payOrder()">Pay</button>
    <button onclick="assignRider()">Assign Rider</button>
    <div id="payResult" class="msg"></div>
  </div>

  <div class="section">
    <h3>Delivery Progress</h3>
    <input id="orderIdProgress" placeholder="Order ID" />
    <select id="progressStatus">
      <option value="PREPARING">PREPARING</option>
      <option value="OUT_FOR_DELIVERY">OUT_FOR_DELIVERY</option>
      <option value="DELIVERED">DELIVERED</option>
    </select>
    <button onclick="updateProgress()">Update Progress</button>
    <div id="progressResult" class="msg"></div>
  </div>

  <div class="section">
    <h3>Track Order</h3>
    <input id="orderIdTrack" placeholder="Order ID" />
    <button onclick="trackOrder()">Track</button>
    <div id="trackResult" class="msg"></div>
  </div>

  <script>
    const SOAP_URL_RESTAURANT = "http://localhost:8080/RestaurantService";
    const SOAP_URL_ORDER = "http://localhost:8080/OrderService";

    async function sendSoap(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/xml" },
        body
      });
      return await res.text();
    }

    function parseXML(xmlText) {
      return new DOMParser().parseFromString(xmlText, "text/xml");
    }

    function getText(node, tag) {
      const el = node.getElementsByTagNameNS("*", tag)[0];
      return el ? el.textContent : "";
    }

    function registerCustomer() {
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:registerCustomer>
              <name>${custName.value}</name>
              <phone>${custPhone.value}</phone>
              <address>${custAddress.value}</address>
            </ws:registerCustomer>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_RESTAURANT, body).then(() => {
        custMsg.textContent = "✅ Customer registered!";
      });
    }

    function loadCustomers() {
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body><ws:getAllCustomers/></soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_RESTAURANT, body).then(xml => {
        const doc = parseXML(xml);
        const list = doc.getElementsByTagNameNS("*", "return");
        const ul = document.getElementById("customers");
        ul.innerHTML = "";

        if (list.length === 0) {
          ul.innerHTML = "<li>No customers found.</li>";
          return;
        }

        for (let i = 0; i < list.length; i++) {
          const id = getText(list[i], "id");
          const name = getText(list[i], "name");
          const address = getText(list[i], "address");
          ul.innerHTML += `<li>ID ${id} - ${name} (${address})</li>`;
        }
      });
    }

    function getRestaurants() {
      const area = document.getElementById("area").value;
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:getRestaurantsByArea><area>${area}</area></ws:getRestaurantsByArea>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_RESTAURANT, body).then(xml => {
        const doc = parseXML(xml);
        const list = doc.getElementsByTagNameNS("*", "return");
        const ul = document.getElementById("restaurants");
        ul.innerHTML = "";

        if (list.length === 0) {
          ul.innerHTML = "<li>No restaurants found in this area.</li>";
          return;
        }

        for (let i = 0; i < list.length; i++) {
          const id = getText(list[i], "id");
          const name = getText(list[i], "name");
          const address = getText(list[i], "address");
          ul.innerHTML += `<li>ID ${id} - ${name} (${address})</li>`;
        }
      });
    }

    function getMenu() {
      const id = document.getElementById("restaurantId").value;
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:getMenuByRestaurant><restaurantId>${id}</restaurantId></ws:getMenuByRestaurant>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_RESTAURANT, body).then(xml => {
        const doc = parseXML(xml);
        const list = doc.getElementsByTagNameNS("*", "return");
        const ul = document.getElementById("menu");
        ul.innerHTML = "";

        if (list.length === 0) {
          ul.innerHTML = "<li>No menu items found.</li>";
          return;
        }

        for (let i = 0; i < list.length; i++) {
          const id = getText(list[i], "id");
          const name = getText(list[i], "name");
          const price = getText(list[i], "price");
          ul.innerHTML += `<li>ID ${id} - ${name} ($${price})</li>`;
        }
      });
    }

    function placeOrder() {
      const customerId = document.getElementById("customerId").value;
      const restaurantId = document.getElementById("restaurantId").value;
      const menuItemId = document.getElementById("menuItemId").value;
      const qty = document.getElementById("qty").value;
      const coupon = document.getElementById("coupon").value;

      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:placeOrder>
              <customerId>${customerId}</customerId>
              <restaurantId>${restaurantId}</restaurantId>
              <menuItemId>${menuItemId}</menuItemId>
              <quantity>${qty}</quantity>
              <couponCode>${coupon}</couponCode>
            </ws:placeOrder>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_ORDER, body).then(xml => {
        const doc = parseXML(xml);
        const orderId = doc.getElementsByTagNameNS("*", "return")[0]?.textContent;
        document.getElementById("orderResult").textContent =
          orderId ? `✅ Order placed! Order ID: ${orderId}` : "❌ Order failed.";
      });
    }

    function payOrder() {
      const orderId = document.getElementById("orderIdPay").value;
      const method = document.getElementById("payMethod").value;

      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:payOrder><orderId>${orderId}</orderId><method>${method}</method></ws:payOrder>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_ORDER, body).then(() => {
        document.getElementById("payResult").textContent = "✅ Payment success!";
      });
    }

    function assignRider() {
      const orderId = document.getElementById("orderIdPay").value;
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:assignRider><orderId>${orderId}</orderId></ws:assignRider>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_ORDER, body).then(() => {
        document.getElementById("payResult").textContent = "✅ Rider assigned!";
      });
    }

    function updateProgress() {
      const orderId = document.getElementById("orderIdProgress").value;
      const progress = document.getElementById("progressStatus").value;

      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:updateDeliveryProgress>
              <orderId>${orderId}</orderId>
              <progress>${progress}</progress>
            </ws:updateDeliveryProgress>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_ORDER, body).then(() => {
        document.getElementById("progressResult").textContent = "✅ Progress updated!";
      });
    }

    function trackOrder() {
      const orderId = document.getElementById("orderIdTrack").value;
      const body = `
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/"
                          xmlns:ws="http://wsdl.fooddelivery.com/">
          <soapenv:Body>
            <ws:trackOrder><orderId>${orderId}</orderId></ws:trackOrder>
          </soapenv:Body>
        </soapenv:Envelope>`;
      sendSoap(SOAP_URL_ORDER, body).then(xml => {
        const doc = parseXML(xml);
        const order = doc.getElementsByTagNameNS("*", "return")[0];

        if (!order) {
          document.getElementById("trackResult").textContent = "❌ Order not found.";
          return;
        }

        const status = getText(order, "status");
        const total = getText(order, "totalPrice");
        document.getElementById("trackResult").textContent =
          `✅ Status: ${status}, Total: ${total}`;
      });
    }
  </script>
</body>
</html>
